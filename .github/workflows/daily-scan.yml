name: Daily job scan

on:
  schedule:
    # Runs at 06:00 UTC every day (07:00/08:00 CET/CEST). Adjust as you like.
    - cron: "0 6 * * *"
  workflow_dispatch: {}  # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python main.py

      - name: Commit updated jobs.json
        run: |
          git config user.name "job-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/jobs.json
          git diff --quiet --cached || git commit -m "Daily scan: $(date -u +'%Y-%m-%d')"
          git push
